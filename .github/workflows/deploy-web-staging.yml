# Builds the in-progress React migration (web/) and deploys it to a
# Cloudflare Pages STAGING project -- forgebook.co.uk's real production
# deploy (GitHub Pages, serving the repo root) is untouched by this
# workflow entirely. Only runs when something under web/ actually changes.
#
# One-time setup needed before this can succeed (see the migration plan):
#   1. Create a Cloudflare Pages project (any name, e.g. "forgebook-web-staging").
#   2. Add two repo secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
#   3. Set CF_PAGES_PROJECT below to match the project name from step 1.
name: Deploy web/ to Cloudflare Pages (staging)

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web-staging.yml"
  workflow_dispatch:

env:
  CF_PAGES_PROJECT: forgebook-web-staging

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ env.CF_PAGES_PROJECT }}
          directory: web/dist
