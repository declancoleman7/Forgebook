# Builds web/ (the React app) and publishes it to GitHub Pages -- this is
# forgebook.co.uk's real production deploy. Requires Settings > Pages >
# "Build and deployment" > Source to be set to "GitHub Actions" (a one-time
# manual switch from the old "Deploy from a branch" setting) before this
# can actually publish; until then the deploy-pages step fails harmlessly.
#
# The old root-level static app (index.html, js/, css/) is left untouched
# in the repo for a rollback confidence period -- switching Pages' source
# back to "Deploy from a branch" is an instant revert.
name: Deploy web/ to GitHub Pages (production)

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
